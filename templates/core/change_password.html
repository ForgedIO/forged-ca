{% extends "base.html" %}
{% block title %}Change password &mdash; ForgedCA{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="card bg-base-100 shadow">
        <div class="card-body">
            <h2 class="card-title">Set a new password</h2>
            <p class="text-sm opacity-70">You're using the default password. Pick a new one before continuing.</p>
            <form method="post" class="mt-3">
                {% csrf_token %}
                {% if error %}
                    <div class="alert alert-error mb-3"><span>{{ error }}</span></div>
                {% endif %}
                <label class="form-control w-full">
                    <div class="label"><span class="label-text">New password</span></div>
                    <input type="password" name="new_password" class="input input-bordered w-full" minlength="8" required autofocus>
                </label>
                <label class="form-control w-full">
                    <div class="label"><span class="label-text">Confirm new password</span></div>
                    <input type="password" name="confirm_password" class="input input-bordered w-full" minlength="8" required>
                </label>
                <div class="card-actions justify-end mt-4">
                    <button type="submit" class="btn btn-primary">Update password</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
