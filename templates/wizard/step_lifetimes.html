{% extends "wizard/_base.html" %}
{% block title %}Lifetimes &mdash; ForgedCA wizard{% endblock %}

{% block wizard %}
<form method="post" class="mt-2 space-y-4">
    {% csrf_token %}
    {% if form.non_field_errors %}
        <div class="alert alert-error">{{ form.non_field_errors }}</div>
    {% endif %}

    {% for field in form %}
        <label class="form-control w-full">
            <div class="label"><span class="label-text">{{ field.label }}</span></div>
            {{ field }}
            {% if field.help_text %}<div class="label"><span class="label-text-alt">{{ field.help_text }}</span></div>{% endif %}
            {% if field.errors %}<div class="label"><span class="label-text-alt text-error">{{ field.errors }}</span></div>{% endif %}
        </label>
    {% endfor %}

    <div class="card-actions justify-between mt-4">
        <a href="{% url 'wizard:step_role' %}" class="btn btn-ghost">Back</a>
        <button type="submit" class="btn btn-primary">Next</button>
    </div>
</form>

<script>
// DaisyUI-ize Django-rendered inputs without template hackery.
document.querySelectorAll('form input[type=text], form input[type=number]').forEach(el => {
    el.classList.add('input', 'input-bordered', 'w-full');
});

// Live "= 20 years" readout below each lifetime-days field so the admin
// doesn't need a calculator to check the number they just typed.
(() => {
    const describe = (days) => {
        if (!Number.isFinite(days) || days <= 0) return '';
        const years = Math.floor(days / 365);
        const rem = days - years * 365;
        const parts = [];
        if (years) parts.push(years + (years === 1 ? ' year' : ' years'));
        if (rem) parts.push(rem + (rem === 1 ? ' day' : ' days'));
        return '\u2248 ' + parts.join(', ');
    };

    document.querySelectorAll('input[name$="_lifetime_days"]').forEach(input => {
        const wrapper = document.createElement('div');
        wrapper.className = 'label py-0';
        wrapper.innerHTML = '<span class="label-text-alt text-primary font-medium" aria-live="polite"></span>';
        input.insertAdjacentElement('afterend', wrapper);
        const out = wrapper.querySelector('span');
        const update = () => {
            out.textContent = describe(parseInt(input.value, 10));
        };
        input.addEventListener('input', update);
        update();
    });
})();
</script>
{% endblock %}
